name: Release SUB Language

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.7-beta)'
        required: true
        type: string

jobs:
  build-unix:
    name: build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            binary_suffix: ''
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            binary_suffix: ''
          - os: macos-13
            platform: macos
            arch: x86_64
            binary_suffix: ''
          - os: macos-26
            platform: macos
            arch: arm64
            binary_suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y gcc make
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install gcc make || true
          fi

      - name: Build all tools
        run: |
          make clean
          make all

      - name: Smoke test all tools
        run: |
          echo 'var x = 42' > /tmp/smoke.sb
          echo 'print(x)' >> /tmp/smoke.sb
          ./sub /tmp/smoke.sb python
          ./subc /tmp/smoke.sb /tmp/smoke_bin
          /tmp/smoke_bin
          ./subi /tmp/smoke.sb

      - name: Package release archive
        run: |
          ARCHIVE_NAME="sub-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp sub subc subi "${ARCHIVE_NAME}/"
          cp LICENSE README.md "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: sub-${{ matrix.platform }}-${{ matrix.arch }}
          path: sub-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          retention-days: 5

  build-windows:
    name: build (windows-x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make
            zip
          msystem: MINGW64

      - name: Build all tools
        shell: msys2 {0}
        run: |
          make clean
          make all

      - name: Smoke test all tools
        shell: msys2 {0}
        run: |
          echo 'var x = 42' > smoke.sb
          echo 'print(x)' >> smoke.sb
          ./sub.exe smoke.sb python
          ./subc.exe smoke.sb smoke_bin
          ./smoke_bin.exe
          ./subi.exe smoke.sb

      - name: Package release archive
        shell: msys2 {0}
        run: |
          ARCHIVE_NAME="sub-windows-x86_64"
          mkdir -p "${ARCHIVE_NAME}"
          cp sub.exe subc.exe subi.exe "${ARCHIVE_NAME}/"
          cp LICENSE README.md "${ARCHIVE_NAME}/"
          zip -r "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}/"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: sub-windows-x86_64
          path: sub-windows-x86_64.zip
          retention-days: 5

  create-release:
    needs: [build-unix, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p ./release-assets
          find ./artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} ./release-assets/ \;
          echo "Release assets:"
          ls -lh ./release-assets/

      - name: Generate checksums
        working-directory: ./release-assets
        run: |
          sha256sum * > checksums-sha256.txt
          echo "Checksums:"
          cat checksums-sha256.txt

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Determine prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == *"-beta"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          {
            echo "## SUB Language ${{ steps.version.outputs.VERSION }}";
            echo "";
            cat docs/RELEASE_NOTES.md;
            echo "";
            echo "---";
            echo "";
            echo "### Downloads";
            echo "";
            echo "Each archive contains the full SUB toolchain: \`sub\` (transpiler), \`subc\` (native compiler), and \`subi\` (interpreter).";
            echo "";
            echo "| Platform | Architecture | Archive |";
            echo "|----------|-------------|---------|";
            echo "| Linux | x86_64 | \`sub-linux-x86_64.tar.gz\` |";
            echo "| Linux | arm64 | \`sub-linux-arm64.tar.gz\` |";
            echo "| macOS | x86_64 (Intel) | \`sub-macos-x86_64.tar.gz\` |";
            echo "| macOS | arm64 (Apple Silicon) | \`sub-macos-arm64.tar.gz\` |";
            echo "| Windows | x86_64 | \`sub-windows-x86_64.zip\` |";
            echo "";
            echo "### Verify checksums";
            echo "\`\`\`bash";
            echo "sha256sum -c checksums-sha256.txt";
            echo "\`\`\`";
          } > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: SUB Language ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.prerelease.outputs.PRERELEASE }}
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} created successfully!"
          echo "📦 Artifacts: Linux (x86_64, arm64), macOS (x86_64, arm64), Windows (x86_64)"
          echo "🔧 Tools: sub (transpiler), subc (native compiler), subi (interpreter)"
          echo "🔗 View release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.VERSION }}"
