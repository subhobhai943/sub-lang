name: build

on:
  push:
  pull_request:

jobs:
  build-unix:
    name: build (${{ matrix.platform }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-26
            platform: macos
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build all tools
        run: make all
      - name: Smoke test transpiler
        run: |
          ./sub tests/test_simple.sb python
      - name: Smoke test native compiler
        run: |
          echo 'var x = 10' > /tmp/test_native.sb
          echo 'print(x)' >> /tmp/test_native.sb
          ./subc /tmp/test_native.sb -o /tmp/test_native_out
          /tmp/test_native_out
      - name: Smoke test interpreter
        run: |
          echo 'var x = 10' > /tmp/test_interp.sb
          echo 'print(x)' >> /tmp/test_interp.sb
          ./subi /tmp/test_interp.sb
      - name: Run regression tests
        run: python3 tests/run_tests.py

  build-windows:
    name: build (windows / x86_64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-python
            make
          msystem: MINGW64
      - name: Build all tools
        shell: msys2 {0}
        run: make all
      - name: Smoke test transpiler
        shell: msys2 {0}
        run: |
          ./sub.exe tests/test_simple.sb python
      - name: Smoke test native compiler
        shell: msys2 {0}
        run: |
          echo 'var x = 10' > test_native.sb
          echo 'print(x)' >> test_native.sb
          ./subc.exe test_native.sb -o test_native_out
          ./test_native_out.exe
      - name: Smoke test interpreter
        shell: msys2 {0}
        run: |
          echo 'var x = 10' > test_interp.sb
          echo 'print(x)' >> test_interp.sb
          ./subi.exe test_interp.sb
      - name: Run regression tests
        shell: msys2 {0}
        run: python3 tests/run_tests.py
